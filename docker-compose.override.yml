services:
  # Base de données S3-like (MinIO) ajoutée à l'architecture Appwrite
  minio:
    image: minio/minio:latest
    container_name: assistia-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Web UI Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-supersecretadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - appwrite

  # Création automatique du bucket par défaut
  minio-init:
    image: minio/mc:latest
    container_name: assistia-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-admin} $${MINIO_ROOT_PASSWORD:-supersecretadmin}; /usr/bin/mc mb myminio/assistia-documents --ignore-existing; /usr/bin/mc anonymous set private myminio/assistia-documents; exit 0; "
    networks:
      - appwrite

  # Frontend SvelteKit
  frontend:
    image: node:22-alpine
    container_name: assistia-frontend
    working_dir: /usr/src/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./src:/usr/src/app
    networks:
      - appwrite
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label-stack=appwrite"
      - "traefik.docker.network=appwrite"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
      - "traefik.http.routers.frontend_http.entrypoints=appwrite_web"
      - "traefik.http.routers.frontend_http.rule=Host(`app.localhost`)"
      - "traefik.http.routers.frontend_https.entrypoints=appwrite_websecure"
      - "traefik.http.routers.frontend_https.rule=Host(`app.localhost`)"
      - "traefik.http.routers.frontend_https.tls=true"

volumes:
  minio_data:

    # Note : le subnet "appwrite" est déjà déclaré dans le docker-compose.yml d'Appwrite
